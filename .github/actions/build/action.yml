description: Set up
name: Build
runs:
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@v6
      with:
        run_install: false
        version: 11.4.0
    - name: Install Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 24.16.0
    - run: pnpm install --frozen-lockfile
      shell: bash
  using: composite
